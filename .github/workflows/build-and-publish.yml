name: Build and publish TaskApp images

on:
  push:
    branches:
      - main
    paths:
      - app/backend/**
      - app/frontend/**
      - .github/workflows/build-and-publish.yml

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image tag
        id: vars
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: app/backend
          push: true
          platforms: linux/amd64
          tags: ghcr.io/${{ github.repository_owner }}/taskapp-backend:${{ steps.vars.outputs.tag }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: app/frontend
          push: true
          platforms: linux/amd64
          tags: ghcr.io/${{ github.repository_owner }}/taskapp-frontend:${{ steps.vars.outputs.tag }}

      - name: Bump Kustomize image tags
        run: |
          sed -i "s|newName: ghcr.io/.*/taskapp-backend|newName: ghcr.io/${{ github.repository_owner }}/taskapp-backend|" manifests/overlays/prod/kustomization.yaml
          sed -i "s|newName: ghcr.io/.*/taskapp-frontend|newName: ghcr.io/${{ github.repository_owner }}/taskapp-frontend|" manifests/overlays/prod/kustomization.yaml
          sed -i "s|newTag: \".*\"|newTag: \"${{ steps.vars.outputs.tag }}\"|g" manifests/overlays/prod/kustomization.yaml

      - name: Commit image tag bump
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: deploy images ${{ steps.vars.outputs.tag }}"
          file_pattern: manifests/overlays/prod/kustomization.yaml
