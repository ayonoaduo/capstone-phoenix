apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: taskapp-backend
  namespace: taskapp
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: taskapp-backend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: taskapp-frontend
  namespace: taskapp
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: taskapp-frontend
