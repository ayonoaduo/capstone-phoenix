apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
images:
  - name: ghcr.io/ayonoaduo/taskapp-backend
    newName: ghcr.io/ayonoaduo/taskapp-backend
    newTag: "f70af05"
  - name: ghcr.io/ayonoaduo/taskapp-frontend
    newName: ghcr.io/ayonoaduo/taskapp-frontend
    newTag: "f70af05"
patches:
  - target:
      kind: ClusterIssuer
      name: letsencrypt-prod
    patch: |-
      - op: replace
        path: /spec/acme/email
        value: ayonoaduo@gmail.com
  - target:
      kind: Ingress
      name: taskapp
      namespace: taskapp
    patch: |-
      - op: replace
        path: /spec/tls/0/hosts/0
        value: taskapp.versv.net
      - op: replace
        path: /spec/rules/0/host
        value: taskapp.versv.net
