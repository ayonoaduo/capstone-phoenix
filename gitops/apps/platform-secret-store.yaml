apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-secret-store
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ayonoaduo/capstone-phoenix.git
    targetRevision: main
    path: gitops/platform/external-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
