- name: Harden all nodes
  hosts: k3s_cluster
  become: true
  roles:
    - base

- name: Install k3s server
  hosts: k3s_servers
  become: true
  roles:
    - k3s_server

- name: Install k3s agents
  hosts: k3s_agents
  become: true
  roles:
    - k3s_agent

- name: Fetch kubeconfig and install platform controllers
  hosts: k3s_servers
  become: true
  roles:
    - kubeconfig
    - platform
